<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, maximum-scale=5.0, viewport-fit=cover">
  <title>Mira Keep • Бесконечные заметки</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
      transition: background-color 0.5s cubic-bezier(0.23, 1, 0.32, 1), color 0.4s ease;
      height: 100vh;
      overflow: hidden;
      margin: 0;
      user-select: none;
      position: fixed;
      width: 100%;
    }

    body.light {
      background-color: #f2f4f7;
      color: #1a1e2b;
      --bg-primary: #ffffff;
      --bg-secondary: #f0f2f5;
      --bg-card: #ffffff;
      --border: rgba(0,0,0,0.06);
      --shadow: 0 8px 25px rgba(0,0,0,0.06);
      --metal: linear-gradient(135deg, #eef0f3 0%, #e2e5ea 100%);
      --metal-shine: rgba(255,255,255,0.8);
      --accent: #3f4552;
      --text-secondary: #5c6270;
      --input-bg: #f9fafc;
      --avatar-border: #ffffff;
      --shimmer: rgba(255,255,255,0.7);
      --canvas-bg: #f0f2f5;
      --glow: rgba(75, 79, 92, 0.15);
      --handle-bg: rgba(0,0,0,0.04);
      --connection-active: #ffd700;
      --connection-line: #a0a8b5;
      --connection-glow: rgba(160, 168, 181, 0.3);
    }

    body.dark {
      background-color: #090b11;
      color: #cfd4e0;
      --bg-primary: #12151e;
      --bg-secondary: #181b26;
      --bg-card: #1b1e2a;
      --border: rgba(255,255,255,0.08);
      --shadow: 0 12px 28px rgba(0,0,0,0.7);
      --metal: linear-gradient(145deg, #2b2f3a 0%, #1f222c 100%);
      --metal-shine: rgba(255,255,255,0.15);
      --accent: #b9c0ce;
      --text-secondary: #8a8f9e;
      --input-bg: #1a1d28;
      --avatar-border: #3d4252;
      --shimmer: rgba(255,255,255,0.1);
      --canvas-bg: #0d0f14;
      --glow: rgba(176, 184, 197, 0.12);
      --handle-bg: rgba(255,255,255,0.03);
      --connection-active: #ffd700;
      --connection-line: #4a4f5a;
      --connection-glow: rgba(74, 79, 90, 0.3);
    }

    body.dark::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: repeating-linear-gradient(0deg, rgba(255,255,255,0.015) 0px, rgba(255,255,255,0.025) 2px, transparent 4px);
      pointer-events: none;
      z-index: 0;
    }

    .app-container {
      width: 100vw;
      height: 100vh;
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
    }

    .top-bar {
      padding: 0.8rem 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(12px);
      z-index: 100;
      transition: all 0.3s ease;
    }

    .profile-section {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .avatar-wrapper {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: 2px solid var(--avatar-border);
      overflow: hidden;
      background: var(--metal);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .avatar-wrapper:hover { transform: scale(1.1); }
    .avatar-wrapper:active { transform: scale(0.95); }
    .avatar-wrapper img { width: 100%; height: 100%; object-fit: cover; }

    .controls {
      display: flex;
      gap: 0.6rem;
      align-items: center;
    }

    button {
      background: var(--metal);
      border: 1px solid rgba(255,255,255,0.2);
      padding: 0.6rem 1.2rem;
      border-radius: 30px;
      font-weight: 500;
      color: inherit;
      cursor: pointer;
      backdrop-filter: blur(4px);
      transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      position: relative;
      overflow: hidden;
      font-family: inherit;
    }

    button::after {
      content: "";
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle at 50% 50%, var(--shimmer) 0%, transparent 70%);
      opacity: 0;
      transition: opacity 0.4s;
    }
    button:hover::after { opacity: 0.7; }
    button:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,0,0,0.15); }
    button:active { transform: scale(0.95); }

    .infinite-canvas {
      flex: 1;
      position: relative;
      overflow: hidden;
      background: var(--canvas-bg);
      cursor: grab;
    }

    .infinite-canvas:active { cursor: grabbing; }
    .infinite-canvas.panning { cursor: grabbing; }

    .canvas-world {
      position: absolute;
      transform-origin: 0 0;
      width: 10000px;
      height: 10000px;
    }

    .connections-layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 5;
    }

    .connection-line {
      stroke: var(--connection-line);
      stroke-width: 2.5;
      fill: none;
      stroke-linecap: round;
      filter: drop-shadow(0 0 6px var(--connection-glow));
    }

    .connection-line.active {
      stroke: var(--connection-active);
      stroke-width: 3;
      filter: drop-shadow(0 0 12px rgba(255, 215, 0, 0.5));
    }

    .connection-line.dash-animated {
      stroke-dasharray: 12 8;
      animation: dashFlow 1s linear infinite;
    }

    @keyframes dashFlow {
      to {
        stroke-dashoffset: -20;
      }
    }

    .connection-line.glow-pulse {
      animation: glowPulse 2s ease-in-out infinite;
    }

    @keyframes glowPulse {
      0%, 100% { opacity: 0.6; stroke-width: 2.5; }
      50% { opacity: 1; stroke-width: 4; }
    }

    .note-card {
      position: absolute;
      background: var(--bg-card);
      border-radius: 16px;
      padding: 0;
      border: 3px solid var(--border);
      box-shadow: var(--shadow);
      word-break: break-word;
      cursor: default;
      min-width: 160px;
      max-width: 500px;
      backdrop-filter: blur(4px);
      transition: box-shadow 0.3s ease, border-color 0.3s ease, transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), height 0.2s ease, width 0.2s ease;
      z-index: 10;
      animation: noteAppear 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      display: flex;
      height: auto;
      min-height: 100px;
      width: 260px;
    }

    .note-card.connecting-source {
      border-color: var(--connection-active) !important;
      box-shadow: 0 0 30px rgba(255, 215, 0, 0.4);
      z-index: 100;
    }

    @keyframes noteAppear {
      0% { opacity: 0; transform: scale(0.8); }
      100% { opacity: 1; transform: scale(var(--note-scale, 1)); }
    }

    .note-card:hover { 
      box-shadow: 0 20px 35px rgba(0,0,0,0.15); 
      z-index: 50; 
    }
    .note-card.dragging { cursor: grabbing; opacity: 0.9; z-index: 60; }
    .note-card.editing { z-index: 55; }
    .note-card.resizing { z-index: 55; }

    .note-handle {
      width: 24px;
      min-width: 24px;
      background: var(--handle-bg);
      border-radius: 16px 0 0 16px;
      cursor: grab;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
      position: relative;
      border-right: 1px solid var(--border);
    }

    .note-handle::before {
      content: "⋮⋮";
      writing-mode: vertical-lr;
      font-size: 0.9rem;
      letter-spacing: 3px;
      color: var(--text-secondary);
      opacity: 0.5;
      transition: opacity 0.3s;
    }

    .note-card:hover .note-handle::before {
      opacity: 0.9;
    }

    .note-handle:hover {
      background: var(--metal);
      cursor: grab;
    }

    .note-handle:active {
      cursor: grabbing;
    }

    .note-resize-handle {
      width: 14px;
      min-width: 14px;
      background: var(--handle-bg);
      border-radius: 0 16px 16px 0;
      cursor: nwse-resize;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
      border-left: 1px solid var(--border);
      font-size: 0.7rem;
      color: var(--text-secondary);
      opacity: 0.3;
      flex-direction: column;
      gap: 2px;
      padding: 4px 0;
      position: relative;
    }

    .note-resize-handle:hover {
      opacity: 0.8;
      background: var(--metal);
    }

    .note-resize-handle::before {
      content: "↕";
      font-size: 0.8rem;
      opacity: 0.5;
    }

    .note-resize-handle::after {
      content: "↔";
      font-size: 0.8rem;
      opacity: 0.5;
      margin-top: -2px;
    }

    .note-resize-handle .resize-hint {
      position: absolute;
      font-size: 0.55rem;
      opacity: 0.4;
      writing-mode: vertical-rl;
      letter-spacing: 1px;
      bottom: 4px;
      color: var(--text-secondary);
    }

    .connection-point {
      position: absolute;
      width: 18px;
      height: 18px;
      background: transparent;
      border-radius: 50%;
      z-index: 200;
      transition: opacity 0.25s ease, transform 0.15s ease, background 0.3s ease;
      opacity: 0;
      transform: scale(0.6);
      cursor: pointer;
      pointer-events: none;
      border: 3px solid #ffd700;
      box-shadow: 0 0 12px rgba(255, 215, 0, 0.3);
    }

    .note-card:hover .connection-point {
      opacity: 0.85;
      transform: scale(1);
      pointer-events: all;
    }

    .connection-point:hover {
      opacity: 1 !important;
      transform: scale(1.4) !important;
      background: rgba(255, 215, 0, 0.4);
      box-shadow: 0 0 25px rgba(255, 215, 0, 0.6);
    }

    .connection-point.active {
      opacity: 1;
      transform: scale(1.3);
      background: rgba(255, 215, 0, 0.5);
      box-shadow: 0 0 30px rgba(255, 215, 0, 0.8);
      pointer-events: all;
    }

    .note-content {
      flex: 1;
      padding: 0.8rem 1rem 0.6rem 1rem;
      display: flex;
      flex-direction: column;
      min-height: 60px;
      overflow: hidden;
    }

    .marker {
      display: inline-block;
      background: #6b7b8f;
      color: white;
      border-radius: 20px;
      padding: 0.15rem 0.6rem;
      font-size: 0.7rem;
      margin: 0.1rem 0.15rem;
      font-weight: 500;
      letter-spacing: 0.2px;
    }

    .note-editor {
      width: 100%;
      min-height: 30px;
      background: transparent;
      border: none;
      color: inherit;
      font-family: inherit;
      font-size: 0.9rem;
      line-height: 1.5;
      resize: none;
      outline: none;
      padding: 0.2rem 0;
      transition: all 0.3s ease;
      caret-color: var(--accent);
      overflow: hidden;
      flex: 1;
    }

    .note-editor:focus {
      animation: textGlow 1.5s ease-in-out infinite;
    }

    @keyframes textGlow {
      0%, 100% { text-shadow: 0 0 0px var(--glow); }
      50% { text-shadow: 0 0 8px var(--glow); }
    }

    .color-picker-wrapper {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      margin-top: 0.3rem;
      flex-shrink: 0;
      padding-top: 0.2rem;
      border-top: 1px solid var(--border);
    }

    .color-picker-btn {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      border: 2px solid var(--border);
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      background: var(--bg-card);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.9rem;
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
    }

    .color-picker-btn:hover {
      transform: scale(1.15);
      border-color: var(--accent);
      box-shadow: 0 0 12px var(--glow);
    }

    .color-picker-btn input[type="color"] {
      position: absolute;
      opacity: 0;
      width: 100%;
      height: 100%;
      cursor: pointer;
      top: 0;
      left: 0;
    }

    .current-color-indicator {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.3);
      pointer-events: none;
      transition: background 0.2s;
    }

    .color-label {
      font-size: 0.65rem;
      color: var(--text-secondary);
      opacity: 0.5;
      font-weight: 400;
    }

    .context-menu {
      position: fixed;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.25);
      z-index: 1000;
      min-width: 220px;
      padding: 0.5rem 0;
      backdrop-filter: blur(16px);
      animation: contextIn 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes contextIn {
      0% { opacity: 0; transform: scale(0.9) translateY(-10px); }
      100% { opacity: 1; transform: scale(1) translateY(0); }
    }

    .context-menu-item {
      padding: 0.7rem 1.5rem;
      cursor: pointer;
      transition: 0.2s ease;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.9rem;
    }
    .context-menu-item:hover {
      background: var(--bg-secondary);
      padding-left: 1.8rem;
    }

    .settings-modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(8px);
      z-index: 2000;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      0% { opacity: 0; }
      100% { opacity: 1; }
    }

    .settings-modal {
      background: var(--bg-card);
      border-radius: 28px;
      padding: 2.5rem;
      border: 1px solid var(--border);
      box-shadow: 0 30px 60px rgba(0,0,0,0.3);
      width: 420px;
      max-width: 90vw;
      backdrop-filter: blur(20px);
      animation: modalSlideIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
      position: relative;
      overflow: hidden;
    }

    @keyframes modalSlideIn {
      0% { opacity: 0; transform: scale(0.8) translateY(30px); }
      100% { opacity: 1; transform: scale(1) translateY(0); }
    }

    .settings-modal::before {
      content: "";
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle at 30% 30%, var(--shimmer) 0%, transparent 70%);
      opacity: 0.1;
      pointer-events: none;
    }

    .settings-section {
      margin-bottom: 1.8rem;
      position: relative;
      z-index: 1;
    }

    .settings-section label {
      display: block;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.1rem;
      color: var(--text-secondary);
      margin-bottom: 0.5rem;
      font-weight: 600;
    }

    .settings-input {
      width: 100%;
      padding: 0.9rem 1.2rem;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: var(--input-bg);
      color: inherit;
      font-family: inherit;
      font-size: 1rem;
      transition: all 0.3s ease;
      outline: none;
    }

    .settings-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--glow);
    }

    .toggle-switch {
      position: relative;
      display: inline-block;
      width: 52px;
      height: 28px;
    }

    .toggle-switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .toggle-slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: var(--bg-secondary);
      transition: 0.4s;
      border-radius: 34px;
      border: 1px solid var(--border);
    }

    .toggle-slider:before {
      position: absolute;
      content: "";
      height: 22px;
      width: 22px;
      left: 2px;
      bottom: 2px;
      background: white;
      transition: 0.4s;
      border-radius: 50%;
    }

    input:checked + .toggle-slider {
      background: var(--accent);
    }

    input:checked + .toggle-slider:before {
      transform: translateX(24px);
    }

    .settings-actions {
      display: flex;
      gap: 0.8rem;
      justify-content: flex-end;
      margin-top: 2rem;
    }

    .btn-primary {
      background: var(--accent);
      color: white;
      border: none;
    }

    .btn-secondary {
      background: transparent;
      border: 1px solid var(--border);
    }

    .loading-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: var(--bg-primary);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.6s ease;
    }

    .loading-content {
      text-align: center;
    }

    .loading-text {
      font-size: 2.5rem;
      font-weight: 300;
      letter-spacing: 0.3rem;
      color: var(--accent);
      animation: loadingFade 2s ease-in-out infinite;
    }

    @keyframes loadingFade {
      0%, 100% { opacity: 0.3; transform: scale(0.97); }
      50% { opacity: 1; transform: scale(1.03); }
    }

    .loading-spinner {
      width: 60px;
      height: 60px;
      margin: 2.5rem auto 0;
      border: 4px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 1.2s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-subtitle {
      margin-top: 1.5rem;
      font-size: 0.9rem;
      color: var(--text-secondary);
      animation: loadingFade 2s ease-in-out infinite 0.5s;
      letter-spacing: 0.1rem;
    }

    .hidden {
      display: none !important;
    }

    .bounce-scale {
      animation: gentleBounce 0.5s cubic-bezier(0.34, 1.2, 0.64, 1);
    }

    @keyframes gentleBounce {
      0% { transform: scale(1); }
      30% { transform: scale(1.03); }
      60% { transform: scale(0.98); }
      100% { transform: scale(1); }
    }
  </style>
</head>
<body class="light">
  <div class="app-container" id="appRoot"></div>

  <script>
    (function() {
      const STORAGE_KEYS = {
        USERS: 'mira_users_v7',
        CURRENT_USER: 'mira_current_v7',
        NOTES: 'mira_notes_v7',
        CONNECTIONS: 'mira_connections_v7',
        SETTINGS: 'mira_settings_v7'
      };

      let currentUser = null;
      let notes = [];
      let connections = [];
      let settings = { theme: 'light', autoTheme: false };

      let canvasScale = 1;
      let canvasOffsetX = 0;
      let canvasOffsetY = 0;
      let isPanning = false;
      let panStart = { x: 0, y: 0 };
      let contextMenu = null;
      let settingsModal = null;

      let connectingSourceId = null;

      const defaultColors = ['#6b7b8f', '#c44b4b', '#4b8c6f', '#b8904b', '#8b6baf', '#4b8bb0', '#d46b8b', '#5b9e8a'];
      const MIN_WIDTH = 160;
      const MAX_WIDTH = 500;
      const MIN_HEIGHT = 100;

      function loadFromStorage() {
        try { currentUser = JSON.parse(localStorage.getItem(STORAGE_KEYS.CURRENT_USER)); } catch(e){}
        try { notes = JSON.parse(localStorage.getItem(STORAGE_KEYS.NOTES)) || []; } catch(e){ notes = []; }
        try { connections = JSON.parse(localStorage.getItem(STORAGE_KEYS.CONNECTIONS)) || []; } catch(e){ connections = []; }
        try { settings = JSON.parse(localStorage.getItem(STORAGE_KEYS.SETTINGS)) || { theme: 'light', autoTheme: false }; } catch(e){}
      }

      function saveAll() {
        if (currentUser) localStorage.setItem(STORAGE_KEYS.CURRENT_USER, JSON.stringify(currentUser));
        localStorage.setItem(STORAGE_KEYS.NOTES, JSON.stringify(notes));
        localStorage.setItem(STORAGE_KEYS.CONNECTIONS, JSON.stringify(connections));
        localStorage.setItem(STORAGE_KEYS.SETTINGS, JSON.stringify(settings));
      }

      function createDefaultUser() {
        const users = JSON.parse(localStorage.getItem(STORAGE_KEYS.USERS) || '{}');
        const defaultEmail = 'user@mirakeep.local';
        if (!users[defaultEmail]) {
          users[defaultEmail] = { password: 'mira', name: 'Исследователь', avatarBase64: '' };
          localStorage.setItem(STORAGE_KEYS.USERS, JSON.stringify(users));
        }
        currentUser = { email: defaultEmail, name: users[defaultEmail].name, avatarBase64: users[defaultEmail].avatarBase64 || '' };
        saveAll();
      }

      function updateProfile(name, avatarBase64) {
        if (!currentUser) return;
        const users = JSON.parse(localStorage.getItem(STORAGE_KEYS.USERS) || '{}');
        if (users[currentUser.email]) {
          users[currentUser.email].name = name;
          users[currentUser.email].avatarBase64 = avatarBase64;
          localStorage.setItem(STORAGE_KEYS.USERS, JSON.stringify(users));
        }
        currentUser.name = name;
        currentUser.avatarBase64 = avatarBase64;
        saveAll();
      }

      function applyTheme() {
        if (settings.autoTheme) {
          const h = new Date().getHours();
          document.body.className = (h >= 19 || h < 8) ? 'dark' : 'light';
        } else {
          document.body.className = settings.theme;
        }
      }

      const appRoot = document.getElementById('appRoot');

      function showLoadingScreen() {
        document.body.className = settings.theme || 'light';
        appRoot.innerHTML = `
          <div class="loading-screen" id="loadingScreen">
            <div class="loading-content">
              <div class="loading-text">Mira Keep</div>
              <div class="loading-spinner"></div>
              <div class="loading-subtitle">Загрузка пространства...</div>
            </div>
          </div>
        `;
        
        const minLoadTime = 1800;
        const startTime = Date.now();
        
        function finishLoading() {
          const elapsed = Date.now() - startTime;
          const remaining = Math.max(0, minLoadTime - elapsed);
          
          setTimeout(() => {
            const loadingScreen = document.getElementById('loadingScreen');
            if (loadingScreen) {
              loadingScreen.style.opacity = '0';
              setTimeout(() => {
                if (!currentUser) createDefaultUser();
                renderMain();
              }, 600);
            }
          }, remaining);
        }
        
        setTimeout(finishLoading, 200);
      }

      function renderMain() {
        applyTheme();
        notes.forEach((n, i) => {
          if (n.x === undefined) n.x = 200 + (i % 4) * 340;
          if (n.y === undefined) n.y = 200 + Math.floor(i / 4) * 300;
          if (!n.color) n.color = defaultColors[0];
          if (n.scale === undefined) n.scale = 1;
          if (n.height === undefined) n.height = 120;
          if (n.width === undefined) n.width = 260;
        });

        appRoot.innerHTML = `
          <div class="top-bar">
            <div class="profile-section">
              <div class="avatar-wrapper" id="avatarUploadTrigger">
                ${currentUser.avatarBase64 ? `<img src="${currentUser.avatarBase64}" alt="avatar">` : '👤'}
              </div>
              <strong style="font-size:1rem;">${escapeHtml(currentUser.name)}</strong>
            </div>
            <div class="controls">
              <button id="zoomOutBtn" title="Уменьшить">−</button>
              <span style="min-width:50px; text-align:center; font-size:0.85rem;" id="zoomLabel">100%</span>
              <button id="zoomInBtn" title="Увеличить">+</button>
              <button id="themeToggleBtn" title="Сменить тему">🌓</button>
              <button id="settingsBtn" title="Настройки">⚙️</button>
            </div>
          </div>
          <div class="infinite-canvas" id="infiniteCanvas">
            <div class="canvas-world" id="canvasWorld">
              <svg class="connections-layer" id="connectionsLayer"></svg>
            </div>
          </div>
        `;

        updateCanvasTransform();
        renderCanvasContent();
        renderConnections();
        attachCanvasListeners();
        attachTopListeners();
        startConnectionAnimation();
      }

      function escapeHtml(s) { 
        return String(s).replace(/[&<>"]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'})[m]); 
      }

      function updateCanvasTransform() {
        const world = document.getElementById('canvasWorld');
        if (world) {
          world.style.transform = `translate(${canvasOffsetX}px, ${canvasOffsetY}px) scale(${canvasScale})`;
        }
        const zoomLabel = document.getElementById('zoomLabel');
        if (zoomLabel) zoomLabel.textContent = Math.round(canvasScale * 100) + '%';
      }

      function getNoteCenter(note) {
        const width = note.width || 260;
        const height = note.height || 120;
        return {
          x: note.x + width / 2,
          y: note.y + height / 2
        };
      }

      function renderConnections() {
        const svg = document.getElementById('connectionsLayer');
        if (!svg) return;

        let paths = '';
        connections.forEach((conn, index) => {
          const from = notes.find(n => n.id === conn.from);
          const to = notes.find(n => n.id === conn.to);
          if (!from || !to) return;

          const fromCenter = getNoteCenter(from);
          const toCenter = getNoteCenter(to);
          
          const dx = toCenter.x - fromCenter.x;
          const dy = toCenter.y - fromCenter.y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          const offset = Math.min(40, dist * 0.15);
          
          const midX = (fromCenter.x + toCenter.x) / 2;
          const midY = (fromCenter.y + toCenter.y) / 2;
          const perpX = -dy / dist * offset;
          const perpY = dx / dist * offset;
          
          const cp1x = fromCenter.x + dx * 0.4 + perpX;
          const cp1y = fromCenter.y + dy * 0.4 + perpY;
          const cp2x = toCenter.x - dx * 0.4 + perpX;
          const cp2y = toCenter.y - dy * 0.4 + perpY;
          
          const isActive = connectingSourceId === conn.from || connectingSourceId === conn.to;
          const isNew = index < 3;
          
          paths += `
            <path class="connection-line ${isActive ? 'active' : ''} ${isNew ? 'dash-animated' : ''} ${isActive ? 'glow-pulse' : ''}"
                  d="M ${fromCenter.x} ${fromCenter.y} C ${cp1x} ${cp1y}, ${cp2x} ${cp2y}, ${toCenter.x} ${toCenter.y}"
                  data-conn-index="${index}"
                  stroke-dasharray="${isNew ? '12 8' : 'none'}"
                  style="transition: all 0.5s ease;" />
          `;
        });

        svg.innerHTML = paths;
      }

      function startConnectionAnimation() {
        setInterval(() => {
          renderConnections();
        }, 2000);
      }

      function renderCanvasContent() {
        const world = document.getElementById('canvasWorld');
        if (!world) return;
        
        const notesHtml = notes.map(n => {
          const borderColor = n.color || defaultColors[0];
          const noteHeight = n.height || 120;
          const noteWidth = n.width || 260;
          const isConnecting = connectingSourceId === n.id;
          return `
            <div class="note-card ${isConnecting ? 'connecting-source' : ''}" data-id="${n.id}" 
                 style="left:${n.x}px; top:${n.y}px; --note-scale:${n.scale || 1}; transform:scale(${n.scale || 1}); border-color:${borderColor}; min-height:${noteHeight}px; height:${noteHeight}px; width:${noteWidth}px; min-width:${Math.min(noteWidth, MIN_WIDTH)}px; max-width:${Math.min(noteWidth, MAX_WIDTH)}px;">
              <div class="note-handle" data-id="${n.id}" title="Перетащить заметку"></div>
              <div class="note-content">
                <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:0.2rem;">
                  <div style="flex:1; overflow:hidden; white-space:nowrap; text-overflow:ellipsis;">${(n.markers||[]).map(m=>`<span class="marker">${escapeHtml(m)}</span>`).join('')}</div>
                  <button class="delete-note-btn" data-id="${n.id}" 
                          style="background:transparent; border:none; padding:0.1rem 0.3rem; cursor:pointer; opacity:0.4; font-size:0.85rem;"
                          title="Удалить">×</button>
                </div>
                <textarea class="note-editor" data-id="${n.id}" 
                          placeholder="Введите текст заметки..."
                          rows="2" style="min-height:${Math.max(25, noteHeight - 80)}px; height:${Math.max(25, noteHeight - 80)}px;">${escapeHtml(n.text)}</textarea>
                <div class="color-picker-wrapper">
                  <div class="color-picker-btn" title="Выбрать цвет бордера">
                    <input type="color" class="custom-color-input" data-note-id="${n.id}" value="${borderColor}">
                    <div class="current-color-indicator" style="background:${borderColor};"></div>
                  </div>
                  <span class="color-label">цвет бордера</span>
                </div>
              </div>
              <div class="note-resize-handle" data-id="${n.id}" title="Изменить размер (перетащите вниз/вверх или влево/вправо)">
                <span class="resize-hint">размер</span>
              </div>
              <div class="connection-point ${isConnecting ? 'active' : ''}" 
                   data-note-id="${n.id}" 
                   style="left:calc(50% - 9px); bottom:-4px; top:auto;"
                   title="Кликните для связывания заметок"></div>
            </div>
          `;
        }).join('');

        const svg = world.querySelector('#connectionsLayer');
        world.innerHTML = notesHtml + `<svg class="connections-layer" id="connectionsLayer"></svg>`;
        
        attachNoteListeners();
        attachResizeHandlers();
        attachConnectionListeners();
        renderConnections();
      }

      function attachResizeHandlers() {
        document.querySelectorAll('.note-resize-handle').forEach(handle => {
          handle.addEventListener('mousedown', (e) => {
            e.stopPropagation();
            e.preventDefault();
            
            const card = handle.closest('.note-card');
            const id = card.dataset.id;
            const note = notes.find(n => n.id === id);
            if (!note) return;
            
            const startX = e.clientX;
            const startY = e.clientY;
            const startWidth = note.width || 260;
            const startHeight = note.height || 120;
            const startScale = canvasScale;
            
            card.classList.add('resizing');
            
            function onMove(ev) {
              const dx = (ev.clientX - startX) / startScale;
              const dy = (ev.clientY - startY) / startScale;
              
              let newWidth = Math.min(MAX_WIDTH, Math.max(MIN_WIDTH, startWidth + dx));
              let newHeight = Math.min(500, Math.max(MIN_HEIGHT, startHeight + dy));
              
              note.width = newWidth;
              note.height = newHeight;
              
              card.style.width = newWidth + 'px';
              card.style.minWidth = Math.min(newWidth, MIN_WIDTH) + 'px';
              card.style.maxWidth = Math.min(newWidth, MAX_WIDTH) + 'px';
              card.style.height = newHeight + 'px';
              card.style.minHeight = newHeight + 'px';
              
              const editor = card.querySelector('.note-editor');
              if (editor) {
                const editorHeight = Math.max(25, newHeight - 80);
                editor.style.height = editorHeight + 'px';
                editor.style.minHeight = editorHeight + 'px';
              }
              
              renderConnections();
            }
            
            function onUp() {
              window.removeEventListener('mousemove', onMove);
              window.removeEventListener('mouseup', onUp);
              card.classList.remove('resizing');
              saveAll();
              renderConnections();
            }
            
            window.addEventListener('mousemove', onMove);
            window.addEventListener('mouseup', onUp);
          });
        });
      }

      function attachConnectionListeners() {
        document.querySelectorAll('.connection-point').forEach(point => {
          point.addEventListener('click', (e) => {
            e.stopPropagation();
            const noteId = point.dataset.noteId;
            
            if (!connectingSourceId) {
              connectingSourceId = noteId;
              renderCanvasContent();
              return;
            }
            
            if (connectingSourceId === noteId) {
              connectingSourceId = null;
              renderCanvasContent();
              return;
            }
            
            const exists = connections.find(c => 
              (c.from === connectingSourceId && c.to === noteId) || 
              (c.from === noteId && c.to === connectingSourceId)
            );
            
            if (!exists) {
              connections.push({ from: connectingSourceId, to: noteId });
              saveAll();
            }
            
            connectingSourceId = null;
            renderCanvasContent();
          });
        });
      }

      function attachNoteListeners() {
        document.querySelectorAll('.delete-note-btn').forEach(btn => {
          btn.addEventListener('click', (e) => {
            e.stopPropagation();
            const id = btn.dataset.id;
            notes = notes.filter(n => n.id !== id);
            connections = connections.filter(c => c.from !== id && c.to !== id);
            if (connectingSourceId === id) connectingSourceId = null;
            saveAll();
            renderCanvasContent();
          });
        });

        document.querySelectorAll('.note-editor').forEach(editor => {
          const noteId = editor.dataset.id;
          
          editor.addEventListener('input', function() {
            const note = notes.find(n => n.id === noteId);
            if (note) {
              note.text = this.value;
              this.style.height = 'auto';
              this.style.height = Math.max(25, this.scrollHeight) + 'px';
              const card = this.closest('.note-card');
              if (card) {
                const newHeight = Math.max(MIN_HEIGHT, this.scrollHeight + 80);
                const currentWidth = note.width || 260;
                note.height = newHeight;
                card.style.height = newHeight + 'px';
                card.style.minHeight = newHeight + 'px';
                
                card.classList.remove('bounce-scale');
                void card.offsetWidth;
                card.classList.add('bounce-scale');
              }
              saveAll();
              renderConnections();
            }
          });

          editor.addEventListener('focus', function() {
            this.closest('.note-card').classList.add('editing');
            const note = notes.find(n => n.id === noteId);
            if (note) {
              this.style.height = 'auto';
              this.style.height = Math.max(25, this.scrollHeight) + 'px';
            }
          });

          editor.addEventListener('blur', function() {
            this.closest('.note-card').classList.remove('editing');
          });

          editor.addEventListener('mousedown', (e) => {
            e.stopPropagation();
          });
        });

        document.querySelectorAll('.note-handle').forEach(handle => {
          handle.addEventListener('mousedown', (e) => {
            e.stopPropagation();
            e.preventDefault();
            
            const card = handle.closest('.note-card');
            const id = card.dataset.id;
            const note = notes.find(n => n.id === id);
            if (!note) return;
            
            const startX = e.clientX;
            const startY = e.clientY;
            const origX = note.x;
            const origY = note.y;
            
            card.classList.add('dragging');
            
            function onMove(ev) {
              const dx = (ev.clientX - startX) / canvasScale;
              const dy = (ev.clientY - startY) / canvasScale;
              note.x = origX + dx;
              note.y = origY + dy;
              card.style.left = note.x + 'px';
              card.style.top = note.y + 'px';
              renderConnections();
            }
            
            function onUp() {
              window.removeEventListener('mousemove', onMove);
              window.removeEventListener('mouseup', onUp);
              card.classList.remove('dragging');
              saveAll();
            }
            
            window.addEventListener('mousemove', onMove);
            window.addEventListener('mouseup', onUp);
          });
        });

        document.querySelectorAll('.note-card').forEach(card => {
          card.addEventListener('wheel', (e) => {
            if (e.target.closest('textarea') || e.target.closest('.color-picker-wrapper') || e.target.closest('.note-resize-handle') || e.target.closest('.connection-point')) return;
            e.stopPropagation();
            e.preventDefault();
            const note = notes.find(n => n.id === card.dataset.id);
            if (!note) return;
            note.scale = Math.min(2.5, Math.max(0.5, (note.scale || 1) + (e.deltaY > 0 ? -0.08 : 0.08)));
            card.style.transform = `scale(${note.scale})`;
            saveAll();
            renderConnections();
          }, { passive: false });
        });

        document.querySelectorAll('.custom-color-input').forEach(input => {
          input.addEventListener('input', (e) => {
            e.stopPropagation();
            const noteId = input.dataset.noteId;
            const note = notes.find(n => n.id === noteId);
            if (note) {
              note.color = e.target.value;
              const card = document.querySelector(`.note-card[data-id="${noteId}"]`);
              if (card) card.style.borderColor = note.color;
              const indicator = input.closest('.color-picker-btn').querySelector('.current-color-indicator');
              if (indicator) indicator.style.background = note.color;
              saveAll();
            }
          });
          input.addEventListener('click', (e) => e.stopPropagation());
        });
      }

      function showContextMenu(x, y, items) {
        if (contextMenu) contextMenu.remove();
        contextMenu = document.createElement('div');
        contextMenu.className = 'context-menu';
        contextMenu.style.left = Math.min(x, window.innerWidth - 240) + 'px';
        contextMenu.style.top = Math.min(y, window.innerHeight - 220) + 'px';
        
        items.forEach(item => {
          const div = document.createElement('div');
          div.className = 'context-menu-item';
          div.textContent = item.label;
          div.onclick = (e) => {
            e.stopPropagation();
            item.action();
            if (contextMenu) contextMenu.remove();
            contextMenu = null;
          };
          contextMenu.appendChild(div);
        });
        
        document.body.appendChild(contextMenu);
        
        const closeMenu = () => {
          if (contextMenu) {
            contextMenu.remove();
            contextMenu = null;
          }
          document.removeEventListener('click', closeMenu);
        };
        
        setTimeout(() => document.addEventListener('click', closeMenu), 50);
      }

      function attachCanvasListeners() {
        const canvas = document.getElementById('infiniteCanvas');
        if (!canvas) return;

        canvas.addEventListener('mousedown', (e) => {
          if (e.target === canvas || e.target.id === 'canvasWorld' || e.target.closest('.connections-layer')) {
            if (e.button === 2) return;
            isPanning = true;
            panStart = { x: e.clientX - canvasOffsetX, y: e.clientY - canvasOffsetY };
            canvas.classList.add('panning');
          }
        });

        window.addEventListener('mousemove', (e) => {
          if (!isPanning) return;
          canvasOffsetX = e.clientX - panStart.x;
          canvasOffsetY = e.clientY - panStart.y;
          updateCanvasTransform();
        });

        window.addEventListener('mouseup', () => {
          if (isPanning) {
            isPanning = false;
            canvas.classList.remove('panning');
          }
        });

        canvas.addEventListener('wheel', (e) => {
          if (e.target.closest('.note-card')) return;
          e.preventDefault();
          
          const rect = canvas.getBoundingClientRect();
          const mouseX = e.clientX - rect.left;
          const mouseY = e.clientY - rect.top;
          const zoomFactor = e.deltaY > 0 ? 0.92 : 1.08;
          const newScale = Math.min(3, Math.max(0.2, canvasScale * zoomFactor));

          canvasOffsetX = mouseX - (mouseX - canvasOffsetX) * (newScale / canvasScale);
          canvasOffsetY = mouseY - (mouseY - canvasOffsetY) * (newScale / canvasScale);
          canvasScale = newScale;
          updateCanvasTransform();
        }, { passive: false });

        canvas.addEventListener('contextmenu', (e) => {
          e.preventDefault();
          const target = e.target.closest('.note-card');
          
          if (target) {
            const id = target.dataset.id;
            
            showContextMenu(e.clientX, e.clientY, [
              { 
                label: '✎ Редактировать', 
                action: () => {
                  const editor = target.querySelector('.note-editor');
                  if (editor) {
                    editor.focus();
                    editor.select();
                  }
                }
              },
              { 
                label: '🗑️ Удалить', 
                action: () => {
                  notes = notes.filter(n => n.id !== id);
                  connections = connections.filter(c => c.from !== id && c.to !== id);
                  if (connectingSourceId === id) connectingSourceId = null;
                  saveAll();
                  renderCanvasContent();
                }
              },
              { 
                label: '✂️ Удалить все связи', 
                action: () => {
                  connections = connections.filter(c => c.from !== id && c.to !== id);
                  saveAll();
                  renderCanvasContent();
                }
              }
            ]);
          } else {
            const rect = canvas.getBoundingClientRect();
            const worldX = (e.clientX - rect.left - canvasOffsetX) / canvasScale;
            const worldY = (e.clientY - rect.top - canvasOffsetY) / canvasScale;
            
            const newNote = {
              id: Date.now().toString() + Math.random().toString(36).substr(2, 5),
              text: '',
              markers: [],
              x: worldX - 130,
              y: worldY - 60,
              color: defaultColors[0],
              scale: 1,
              height: 120,
              width: 260,
            };
            
            notes.push(newNote);
            saveAll();
            renderCanvasContent();
            
            setTimeout(() => {
              const editor = document.querySelector(`.note-editor[data-id="${newNote.id}"]`);
              if (editor) editor.focus();
            }, 100);
          }
        });
      }

      function openSettingsModal() {
        if (settingsModal) settingsModal.remove();
        
        settingsModal = document.createElement('div');
        settingsModal.className = 'settings-modal-overlay';
        settingsModal.innerHTML = `
          <div class="settings-modal">
            <h2 style="margin-bottom:2rem; font-weight:400; letter-spacing:-0.02em;">⚙️ Настройки</h2>
            
            <div class="settings-section">
              <label>Имя пользователя</label>
              <input type="text" class="settings-input" id="settingsNameInput" value="${escapeHtml(currentUser.name)}" placeholder="Ваше имя">
            </div>
            
            <div class="settings-section">
              <label>Аватар</label>
              <div style="display:flex; align-items:center; gap:1rem;">
                <div class="avatar-wrapper" id="settingsAvatarPreview" style="width:56px; height:56px;">
                  ${currentUser.avatarBase64 ? `<img src="${currentUser.avatarBase64}" alt="avatar">` : '👤'}
                </div>
                <button id="changeAvatarBtn" class="btn-secondary" style="font-size:0.85rem;">Загрузить фото</button>
              </div>
            </div>
            
            <div class="settings-section">
              <label style="display:flex; align-items:center; justify-content:space-between;">
                <span>Автоматическая тема</span>
                <label class="toggle-switch">
                  <input type="checkbox" id="autoThemeToggle" ${settings.autoTheme ? 'checked' : ''}>
                  <span class="toggle-slider"></span>
                </label>
              </label>
              <p style="font-size:0.75rem; color:var(--text-secondary); margin-top:0.5rem;">
                Ночная тема включается с 19:00 до 8:00
              </p>
            </div>
            
            <div class="settings-actions">
              <button id="closeSettingsBtn" class="btn-secondary">Отмена</button>
              <button id="saveSettingsBtn" class="btn-primary">Сохранить</button>
            </div>
          </div>
        `;
        
        document.body.appendChild(settingsModal);
        
        document.getElementById('closeSettingsBtn').addEventListener('click', closeSettingsModal);
        settingsModal.addEventListener('click', (e) => {
          if (e.target === settingsModal) closeSettingsModal();
        });
        
        document.getElementById('changeAvatarBtn').addEventListener('click', () => {
          const inp = document.createElement('input');
          inp.type = 'file';
          inp.accept = 'image/*';
          inp.onchange = e => {
            const f = e.target.files[0];
            if (!f) return;
            const r = new FileReader();
            r.onload = ev => {
              const preview = document.getElementById('settingsAvatarPreview');
              if (preview) {
                preview.innerHTML = `<img src="${ev.target.result}" alt="avatar">`;
                preview.dataset.newAvatar = ev.target.result;
              }
            };
            r.readAsDataURL(f);
          };
          inp.click();
        });
        
        document.getElementById('saveSettingsBtn').addEventListener('click', () => {
          const newName = document.getElementById('settingsNameInput').value.trim();
          const autoTheme = document.getElementById('autoThemeToggle').checked;
          const preview = document.getElementById('settingsAvatarPreview');
          const newAvatar = preview?.dataset?.newAvatar || currentUser.avatarBase64;
          
          if (newName) {
            updateProfile(newName, newAvatar);
          }
          
          settings.autoTheme = autoTheme;
          saveAll();
          applyTheme();
          closeSettingsModal();
          renderMain();
        });
      }

      function closeSettingsModal() {
        if (settingsModal) {
          settingsModal.style.opacity = '0';
          settingsModal.style.transition = 'opacity 0.3s ease';
          setTimeout(() => {
            if (settingsModal) settingsModal.remove();
            settingsModal = null;
          }, 300);
        }
      }

      function attachTopListeners() {
        document.getElementById('zoomInBtn')?.addEventListener('click', () => {
          canvasScale = Math.min(3, canvasScale * 1.15);
          updateCanvasTransform();
        });
        
        document.getElementById('zoomOutBtn')?.addEventListener('click', () => {
          canvasScale = Math.max(0.2, canvasScale * 0.85);
          updateCanvasTransform();
        });

        document.getElementById('themeToggleBtn')?.addEventListener('click', () => {
          settings.autoTheme = false;
          settings.theme = document.body.classList.contains('dark') ? 'light' : 'dark';
          saveAll();
          applyTheme();
          renderMain();
        });

        document.getElementById('settingsBtn')?.addEventListener('click', openSettingsModal);

        document.getElementById('avatarUploadTrigger')?.addEventListener('click', () => {
          const inp = document.createElement('input');
          inp.type = 'file';
          inp.accept = 'image/*';
          inp.onchange = e => {
            const f = e.target.files[0];
            if (!f) return;
            const r = new FileReader();
            r.onload = ev => {
              updateProfile(currentUser.name, ev.target.result);
              renderMain();
            };
            r.readAsDataURL(f);
          };
          inp.click();
        });
      }

      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
          if (settingsModal) closeSettingsModal();
          if (contextMenu) { contextMenu.remove(); contextMenu = null; }
          if (connectingSourceId) {
            connectingSourceId = null;
            renderCanvasContent();
          }
        }
        
        if (e.ctrlKey && e.key === 'n') {
          e.preventDefault();
          const newNote = {
            id: Date.now().toString() + Math.random().toString(36).substr(2, 5),
            text: '',
            markers: [],
            x: (window.innerWidth / 2 - canvasOffsetX) / canvasScale - 130,
            y: (window.innerHeight / 2 - canvasOffsetY) / canvasScale - 60,
            color: defaultColors[0],
            scale: 1,
            height: 120,
            width: 260,
          };
          notes.push(newNote);
          saveAll();
          renderCanvasContent();
          setTimeout(() => {
            const editor = document.querySelector(`.note-editor[data-id="${newNote.id}"]`);
            if (editor) editor.focus();
          }, 100);
        }
      });

      loadFromStorage();
      showLoadingScreen();
      
      setInterval(() => {
        if (settings.autoTheme && currentUser) applyTheme();
      }, 60000);
    })();
  </script>
</body>
</html>
